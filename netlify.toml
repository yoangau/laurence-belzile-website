[functions]
  node_bundler = "esbuild"
  external_node_modules = ["aws-sdk", "buffer", "events", "ieee754", "jmespath", "querystring", "sax", "url", "util", "uuid", "xml2js", "xmlbuilder"]
  included_files = [
    "node_modules/aws-sdk/**",
    "node_modules/buffer/**",
    "node_modules/events/**",
    "node_modules/ieee754/**",
    "node_modules/jmespath/**",
    "node_modules/querystring/**",
    "node_modules/sax/**",
    "node_modules/url/**",
    "node_modules/util/**",
    "node_modules/uuid/**",
    "node_modules/xml2js/**",
    "node_modules/xmlbuilder/**"
  ]

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
